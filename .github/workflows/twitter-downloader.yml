name: X Video Downloader

on:
  workflow_dispatch:
    inputs:

      profile:
        description: "X profile username (without @)"
        required: true

      start_from_last:
        description: "Start from Nth last tweet"
        default: "1"
        required: true

      end_from_last:
        description: "End at Nth last tweet"
        default: "5"
        required: true

jobs:
  download:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Install tools
        run: |
          sudo apt update -qq
          sudo apt install -y jq curl ffmpeg

          sudo curl -L \
          https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
          -o /usr/local/bin/yt-dlp

          sudo chmod a+rx /usr/local/bin/yt-dlp


      - name: Prepare folders
        run: |
          mkdir -p downloads/x
          mkdir -p logs


      - name: Get tweets list
        run: |

          USER="${{ github.event.inputs.profile }}"
          START="${{ github.event.inputs.start_from_last }}"
          END="${{ github.event.inputs.end_from_last }}"

          echo "User: $USER"
          echo "Start: $START"
          echo "End: $END"

          yt-dlp \
            --flat-playlist \
            --playlist-end 200 \
            "https://twitter.com/$USER" \
            -J > tweets.json


      - name: Select tweet range
        run: |

          START="${{ github.event.inputs.start_from_last }}"
          END="${{ github.event.inputs.end_from_last }}"

          TOTAL=$(jq '.entries | length' tweets.json)

          START_INDEX=$((TOTAL - START))
          END_INDEX=$((TOTAL - END))

          if [ $END_INDEX -lt 0 ]; then
            END_INDEX=0
          fi

          jq ".entries[$END_INDEX:$START_INDEX] | .[].url" tweets.json \
          | tr -d '"' > selected.txt

          echo "Selected tweets:"
          cat selected.txt


      - name: Download videos
        run: |

          while read url
          do

          yt-dlp \
          --ignore-errors \
          --no-warnings \
          --match-filter "duration > 0" \
          -o "downloads/x/%(uploader)s/%(upload_date)s_%(id)s.%(ext)s" \
          "$url"

          done < selected.txt


      - name: Save logs
        run: |
          echo "Done" > logs/x-download.log


      - name: Commit files
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add downloads logs

          git commit -m "downloaded x videos" || echo "nothing to commit"

          git push
