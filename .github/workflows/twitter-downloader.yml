name: Twitter/X Profile Video Downloader

on:
  workflow_dispatch:
    inputs:
      profile_url:
        description: "Twitter/X profile URL"
        required: true
        type: string

      max_videos:
        description: "Number of latest videos"
        required: false
        default: "20"
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install tools
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl nodejs jq

          sudo curl -L \
          https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
          -o /usr/local/bin/yt-dlp

          sudo chmod a+rx /usr/local/bin/yt-dlp

      # Show versions
      - name: Tool versions
        run: |
          yt-dlp --version
          node --version
          ffmpeg -version | head -n 1

      # Prepare folders
      - name: Prepare folders
        run: |
          mkdir -p downloads/twitter
          mkdir -p logs

           - name: Download latest videos
        run: |
          PROFILE="${{ github.event.inputs.profile_url }}"
          MAX="${{ github.event.inputs.max_videos }}"

          echo "PROFILE=$PROFILE"
          echo "MAX=$MAX"

          yt-dlp \
            --verbose \
            --playlist-end $MAX \
            --match-filter "duration > 0" \
            --extractor-args "twitter:api=syndication" \
            --user-agent "Mozilla/5.0" \
            --ignore-errors \
            --no-abort-on-error \
            -o "downloads/twitter/%(uploader)s/%(upload_date)s_%(id)s.%(ext)s" \
            "$PROFILE/media" \
            2>&1 | tee logs/twitter-profile.log


      # Push files
      - name: Commit files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add downloads logs

          git commit -m "Downloaded Twitter/X profile videos" || echo "Nothing to commit"

          git push
