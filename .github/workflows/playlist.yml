name: دانلودر یوتیوب پایدار V2

on:
  workflow_dispatch:
    inputs:
      url:
        description: "لینک ویدیو یا پلی‌لیست"
        required: true

      quality:
        description: "کیفیت"
        required: true
        default: "720"
        type: choice
        options:
          - "360"
          - "480"
          - "720"
          - "1080"
          - "best"

      format:
        description: "فرمت"
        required: true
        default: "mp4"
        type: choice
        options:
          - "mp4"
          - "mp3"

      upload_release:
        description: "آپلود در Releases"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: youtube-downloader
  cancel-in-progress: false

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip

          pip install -U yt-dlp

      # -----------------------------
      # POT Provider
      # -----------------------------
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PO Token Provider
        run: |
          npm install -g bgutil-ytdlp-pot-provider

      - name: Start PO Token Provider
        run: |
          nohup bgutil-ytdlp-pot-provider server \
            --host 127.0.0.1 \
            --port 4416 > provider.log 2>&1 &

          sleep 10

      # -----------------------------
      # Prepare folders
      # -----------------------------
      - name: Prepare folders
        run: |
          mkdir -p downloads

      # -----------------------------
      # Download
      # -----------------------------
      - name: Download media
        shell: bash
        run: |

          URL="${{ github.event.inputs.url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          FORMAT="${{ github.event.inputs.format }}"

          if [ "$FORMAT" = "mp3" ]; then

            yt-dlp \
              --yes-playlist \
              --ignore-errors \
              --continue \
              --no-overwrites \
              --retries 20 \
              --fragment-retries 20 \
              --extractor-retries 20 \
              --file-access-retries 10 \
              --sleep-requests 3 \
              --sleep-interval 5 \
              --max-sleep-interval 15 \
              --concurrent-fragments 1 \
              --extractor-args "youtube:player_client=android_music,android_creator,tv_embedded,web_safari;po_token_provider=http://127.0.0.1:4416" \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/125.0 Safari/537.36" \
              --geo-bypass \
              --audio-format mp3 \
              --extract-audio \
              -o "downloads/%(playlist_title|NA)s/%(playlist_index|0)03d - %(title)s.%(ext)s" \
              "$URL"

          else

            if [ "$QUALITY" = "best" ]; then
              FORMAT_SELECTOR="bv*+ba/b"
            else
              FORMAT_SELECTOR="bv*[height<=${QUALITY}]+ba/b[height<=${QUALITY}]"
            fi

            yt-dlp \
              --yes-playlist \
              --ignore-errors \
              --continue \
              --no-overwrites \
              --merge-output-format mp4 \
              --retries 20 \
              --fragment-retries 20 \
              --extractor-retries 20 \
              --file-access-retries 10 \
              --sleep-requests 3 \
              --sleep-interval 5 \
              --max-sleep-interval 15 \
              --concurrent-fragments 1 \
              --extractor-args "youtube:player_client=android_music,android_creator,tv_embedded,web_safari;po_token_provider=http://127.0.0.1:4416" \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/125.0 Safari/537.36" \
              --geo-bypass \
              -f "$FORMAT_SELECTOR" \
              -o "downloads/%(playlist_title|NA)s/%(playlist_index|0)03d - %(title)s.%(ext)s" \
              "$URL"

          fi

      # -----------------------------
      # Check files
      # -----------------------------
      - name: Check downloaded files
        run: |
          echo "Downloaded files:"
          find downloads -type f | head -50

          COUNT=$(find downloads -type f | wc -l)

          echo "Files count: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "هیچ فایلی دانلود نشد"
            exit 1
          fi

      # -----------------------------
      # Push to repo
      # -----------------------------
      - name: Commit and Push
        if: github.event.inputs.upload_release != 'true'
        run: |

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add downloads/

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Add downloaded media"

          git fetch origin main
          git rebase origin/main

          git push origin HEAD:main

      # -----------------------------
      # Zip files
      # -----------------------------
      - name: Create ZIP
        if: github.event.inputs.upload_release == 'true'
        run: |
          zip -r media.zip downloads

      # -----------------------------
      # Upload Release
      # -----------------------------
      - name: Create Release
        if: github.event.inputs.upload_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: download-${{ github.run_number }}
          name: دانلود شماره ${{ github.run_number }}
          files: media.zip
