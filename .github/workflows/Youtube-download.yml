name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "YouTube URL"
        required: true
        type: string

      format:
        description: "Output format"
        required: true
        default: mp4
        type: choice
        options:
          - mp4
          - mp3

      quality:
        description: "Quality (video: 720/1080 | audio: 192/320)"
        required: false
        default: "720"

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          python3 -m pip install --upgrade pip
          pip3 install --upgrade yt-dlp

      - name: Show yt-dlp version
        run: yt-dlp --version

      - name: Create download folder
        run: mkdir -p downloads
        
      - name: Debug video info
        run: |
          yt-dlp --no-playlist --dump-single-json "${{ github.event.inputs.video_url }}"

      - name: Download from YouTube
        run: |
          URL="${{ github.event.inputs.video_url }}"
          FORMAT="${{ github.event.inputs.format }}"
          QUALITY="${{ github.event.inputs.quality }}"

          echo "Downloading: $URL"

          if [ "$FORMAT" = "mp3" ]; then
            yt-dlp \
              --no-playlist \
              -x \
              --audio-format mp3 \
              --audio-quality ${QUALITY}K \
              -o "downloads/%(title)s.%(ext)s" \
              "$URL"
          else
            yt-dlp \
              --no-playlist \
              -f "bv*+ba/b" \
              --merge-output-format mp4 \
              -o "downloads/%(title)s.%(ext)s" \
              "$URL"
          fi

      - name: Push files to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Downloaded from YouTube" || echo "Nothing to commit"
          git push
