name: YouTube Downloader (Stable)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube video or playlist URL"
        required: true
        type: string

      format:
        description: "Download format"
        required: true
        default: mp4
        type: choice
        options:
          - mp4
          - mp3

      quality:
        description: "Quality (mp4: 720/1080 | mp3: 128/192/320)"
        required: false
        default: "720"
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1️⃣ Install system dependencies + JS runtime
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl nodejs
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Show yt-dlp info
        run: |
          yt-dlp --version
          node --version
          ffmpeg -version | head -n 1

      # 2️⃣ Prepare output folder
      - name: Create download folder
        run: mkdir -p downloads/youtube

      # 3️⃣ Download from YouTube (BOT-safe)
      - name: Download video(s)
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          FORMAT="${{ github.event.inputs.format }}"
          QUALITY="${{ github.event.inputs.quality }}"

          echo "URL: $URL"
          echo "FORMAT: $FORMAT"
          echo "QUALITY: $QUALITY"

          BASE_ARGS="\
          --extractor-args youtube:player_client=android \
          --js-runtimes node \
          --add-header User-Agent:Mozilla/5.0 \
          --ignore-errors \
          --no-abort-on-error \
          "

          if [ "$FORMAT" = "mp3" ]; then
            yt-dlp \
              $BASE_ARGS \
              -x \
              --audio-format mp3 \
              --audio-quality ${QUALITY}K \
              -o "downloads/youtube/%(title)s.%(ext)s" \
              "$URL"
          else
            yt-dlp \
              $BASE_ARGS \
              -f "bv*[height<=${QUALITY}]+ba/b" \
              --merge-output-format mp4 \
              -o "downloads/youtube/%(title)s.%(ext)s" \
              "$URL"
          fi

      # 4️⃣ Commit files back to repository
      - name: Push downloaded files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/youtube/
          git commit -m "YouTube download" || echo "Nothing to commit"
          git push
