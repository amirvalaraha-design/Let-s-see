name: MHTML ذخیره صفحه به Release

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the webpage to download'
        required: true
        type: string

      title:
        description: 'Optional filename'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pyppeteer
          sudo apt update
          sudo apt install -y zip

      - name: Run MHTML downloader
        run: |
          python save_as_mhtml.py \
            --url "${{ github.event.inputs.url }}" \
            ${GITHUB_EVENT_INPUTS_TITLE:+--title "${{ github.event.inputs.title }}"}

      - name: Zip downloaded files
        run: |
          cd download
          zip -r archive.zip .

      - name: Generate release tag
        id: tag
        run: |
          echo "tag=release-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Saved Page Release
          files: |
            download/archive.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
