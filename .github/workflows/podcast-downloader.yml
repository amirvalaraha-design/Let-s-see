name: Podcast Downloader

on:
  workflow_dispatch:
    inputs:
      podcast_url:
        description: 'Podcast episode URL or RSS feed'
        required: true
        type: string

      limit:
        description: 'How many episodes (RSS only)'
        required: false
        default: '3'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y yt-dlp ffmpeg

      - name: Download podcast
        run: |
          mkdir -p podcasts
          URL="${{ github.event.inputs.podcast_url }}"
          LIMIT="${{ github.event.inputs.limit }}"

          yt-dlp \
            --extract-audio \
            --audio-format mp3 \
            --audio-quality 192K \
            --yes-playlist \
            --playlist-end "$LIMIT" \
            -o "podcasts/%(playlist_title)s/%(title)s.%(ext)s" \
            "$URL"

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add podcasts/
          git commit -m "Download podcast" || echo "Nothing to commit"
          git push
