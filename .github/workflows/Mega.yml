name: Download from MEGA to Repo

on:
  workflow_dispatch:
    inputs:
      mega_url:
        description: "MEGA file or folder URL"
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install megatools
        run: |
          sudo apt update
          sudo apt install -y megatools

      - name: Create download folder
        run: |
          mkdir -p downloads

      - name: Download from MEGA
        run: |
          megadl \
            --path downloads \
            "${{ github.event.inputs.mega_url }}"

      - name: Show files
        run: |
          ls -lah downloads

      - name: Commit files to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add downloads/*
          git commit -m "Add MEGA download from ${{ github.event.inputs.mega_url }}" || echo "No changes"

          git pull --rebase origin main
          git push origin main

      - name: Compress downloads
        run: |
          cd downloads
          zip -r ../mega_download.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mega-download
          path: mega_download.zip
