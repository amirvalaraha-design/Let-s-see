name: Download from MEGA to Repo

on:
  workflow_dispatch:
    inputs:
      mega_url:
        description: "MEGA file or folder URL"
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y megatools rar zip

      - name: Create folders
        run: |
          mkdir -p downloads
          mkdir -p upload_parts

      - name: Download from MEGA
        run: |
          megadl \
            --path downloads \
            "${{ github.event.inputs.mega_url }}"

      - name: Show downloaded files
        run: |
          ls -lah downloads

      - name: Create multi-part RAR archive
        run: |
          rar a -v90m upload_parts/mega_archive.rar downloads/

      - name: Show archive parts
        run: |
          ls -lah upload_parts

      - name: Commit archive parts to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add upload_parts/*

          git commit -m "Add MEGA multipart archive" || echo "No changes"

          git pull --rebase origin main

          git push origin main

