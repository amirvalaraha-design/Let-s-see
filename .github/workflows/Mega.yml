name: Download from MEGA

on:
  workflow_dispatch:
    inputs:
      mega_url:
        description: "MEGA file or folder URL"
        required: true
        type: string

permissions:
  contents: read

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MEGA tools
        run: |
          sudo apt update
          sudo apt install -y megatools zip

      - name: Create download folder
        run: |
          mkdir -p downloads

      - name: Download from MEGA
        run: |
          megadl \
            --path downloads \
            "${{ github.event.inputs.mega_url }}"

      - name: Show downloaded files
        run: |
          ls -lah downloads

      - name: Compress downloads
        run: |
          cd downloads
          zip -r ../mega_download.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mega-download
          path: mega_download.zip
